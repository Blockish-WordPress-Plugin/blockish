name: Deploy to WordPress.org

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JS
        run: npm run lint:js

      - name: Lint CSS
        run: npm run lint:css

      - name: Build
        run: npm run build

      - name: Create plugin zip
        run: npm run plugin-zip

      - name: Extract zip for deployment
        run: unzip blockish.zip -d ./dist/

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-org-deploy@stable
        with:
          plugin-slug: blockish
          svn-username: ${{ secrets.SVN_USERNAME }}
          svn-password: ${{ secrets.SVN_PASSWORD }}
          build-dir: ./dist/blockish
          assets-dir: .wordpress-org/assets
