name: Update WordPress.org Assets

on:
  push:
    branches:
      - main
    paths:
      - '.wordpress-org/assets/**'
  workflow_dispatch:

jobs:
  update-assets:
    name: Push Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy assets to WordPress.org
        uses: 10up/action-wordpress-org-deploy@stable
        with:
          plugin-slug: blockish
          svn-username: ${{ secrets.SVN_USERNAME }}
          svn-password: ${{ secrets.SVN_PASSWORD }}
          assets-dir: .wordpress-org/assets
          generate-zip: false
